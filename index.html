  <!-- Progress Storage -->
  <script>
  var CDM_PROGRESS_KEY = 'cdm-progress';

  var Progress = {
    _data: null,

    load: function() {
      try {
        var raw = localStorage.getItem(CDM_PROGRESS_KEY);
        this._data = raw ? JSON.parse(raw) : { schemaVersion: 1 };
      } catch (e) {
        console.warn('Failed to load progress, starting fresh:', e);
        this._data = { schemaVersion: 1 };
      }
      return this._data;
    },

    save: function() {
      try {
        localStorage.setItem(CDM_PROGRESS_KEY, JSON.stringify(this._data));
      } catch (e) {
        console.warn('Failed to save progress:', e);
      }
    },

    _ensureMap: function(mapId) {
      if (!this._data[mapId]) {
        this._data[mapId] = { found: [], notes: {}, customMarkers: [] };
      }
      return this._data[mapId];
    },

    isFound: function(mapId, markerId) {
      var mapData = this._data[mapId];
      return mapData ? mapData.found.indexOf(markerId) !== -1 : false;
    },

    toggleFound: function(mapId, markerId) {
      var mapData = this._ensureMap(mapId);
      var idx = mapData.found.indexOf(markerId);
      if (idx === -1) {
        mapData.found.push(markerId);
      } else {
        mapData.found.splice(idx, 1);
      }
      this.save();
      return idx === -1;
    },

    getNote: function(mapId, markerId) {
      var mapData = this._data[mapId];
      return mapData && mapData.notes ? (mapData.notes[markerId] || '') : '';
    },

    setNote: function(mapId, markerId, text) {
      var mapData = this._ensureMap(mapId);
      if (text && text.trim()) {
        mapData.notes[markerId] = text.trim();
      } else {
        delete mapData.notes[markerId];
      }
      this.save();
    },

    getFoundCount: function(mapId, categoryId, allMarkers) {
      var mapData = this._data[mapId];
      var categoryMarkers = allMarkers.filter(function(m) { return m.categoryId === categoryId; });
      var foundCount = mapData ? categoryMarkers.filter(function(m) { return mapData.found.indexOf(m.id) !== -1; }).length : 0;
      return { found: foundCount, total: categoryMarkers.length };
    },

    getTotalCount: function(mapId, allMarkers) {
      var mapData = this._data[mapId];
      if (!mapData) return { found: 0, total: allMarkers.length };
      var foundCount = allMarkers.filter(function(m) { return mapData.found.indexOf(m.id) !== -1; }).length;
      return { found: foundCount, total: allMarkers.length };
    },

    getData: function() { return this._data; },

    getCustomMarkers: function(mapId) {
      var mapData = this._data[mapId];
      return mapData && mapData.customMarkers ? mapData.customMarkers : [];
    },

    addCustomMarker: function(mapId, marker) {
      var mapData = this._ensureMap(mapId);
      marker.isCustom = true;
      marker.id = 'custom-' + Date.now();
      mapData.customMarkers.push(marker);
      this.save();
      return marker;
    },

    updateCustomMarker: function(mapId, markerId, updates) {
      var mapData = this._ensureMap(mapId);
      var marker = mapData.customMarkers.find(function(m) { return m.id === markerId; });
      if (marker) {
        Object.keys(updates).forEach(function(key) { marker[key] = updates[key]; });
        this.save();
      }
      return marker;
    },

    deleteCustomMarker: function(mapId, markerId) {
      var mapData = this._ensureMap(mapId);
      mapData.customMarkers = mapData.customMarkers.filter(function(m) { return m.id !== markerId; });
      this.save();
    }
  };

  Progress.load();

  // To import MapGenie progress: use Tools > Import Progress with a JSON file
  </script>

    // --- Icon map (icon name -> unicode codepoint) ---
    var ICON_MAP = {"witchs_hideout":"e900","well":"e901","weapon":"e902","walker":"e903","wagon_fence":"e904","treasure_map_solution":"e905","treasure_map":"e906","treasure_chest":"e907","tool_blueprint":"e908","tool":"e909","timber_warehouse":"e90a","tannery":"e90b","tailors_shop":"e90c","stronghold":"e90d","street_shop":"e90e","stone":"e90f","stable":"e910","spire":"e911","spider_web":"e912","smithy":"e913","skyroot":"e914","silver_ore":"e915","shadow_sanctum":"e916","secret_space":"e917","secret_shop":"e918","sealed_abyss_artifact":"e919","scolecite_ore":"e91a","saddlery":"e91b","rubber":"e91c","royal_trading_post":"e91d","research_institute":"e921","red_seaweed":"e922","recipe":"e923","reading_material":"e924","ranchers_shop":"e925","puzzle_clue":"e926","provisioners_shop":"e927","produce":"e928","prey_animal":"e929","predator":"e92a","point_of_interest":"e92b","pine_mushroom":"e92c","pet_shop":"e92d","pet":"e92e","palmar_leaf":"e92f","pack":"e930","oakwood_mushroom":"e931","npc":"e932","notice_board":"e933","mysterious_creature":"e934","mount":"e935","money":"e936","miscellaneous":"e937","minigame":"e938","mineral_shop":"e939","mercury":"e93a","memory_fragment":"e93b","main_quest":"e93c","locked_treasure":"e93d","livestock_fence":"e93e","legendary_animal":"e93f","learn_skill":"e940","kuku_shop":"e941","kuku_pot_item":"e942","key_item":"e943","key":"e944","iron_ore":"e945","inn":"e946","infirmary":"e947","horse_black_market":"e948","honey":"e949","hidden_passage":"e94a","herb":"e94b","guard_station":"e94c","grocers_shop":"e94d","grindstone":"e94e","greymane_shrine":"e94f","green_algae":"e950","gold_ore":"e951","ginseng":"e952","garnet":"e953","furniture_shop":"e954","fishing_shop":"e955","faction_quest":"e956","equipment_shop":"e957","equipment_blueprint":"e958","epidote":"e959","elixir":"e95a","elite_enemy":"e95b","easter_egg":"e95c","dyehouse":"e95d","dye":"e95e","diamond":"e95f","decorative_stone_shop":"e960","coral_mushroom":"e961","copper_ore":"e962","contribution_shop":"e963","constellation":"e964","confessional":"e965","common_equipment":"e966","chest":"e967","cave":"e968","cauldron":"e969","butchery":"e96a","brimstone":"e96b","boss":"e96c","bonfire":"e96d","bloodstone":"e96e","black_market_trading":"e96f","bismuth_ore":"e970","bell":"e971","barracks":"e972","bank":"e973","back_alley_shop":"e974","azurite":"e975","artwork_shop":"e976","artillery_unit":"e977","armor":"e978","area":"e979","anvil":"e97a","alchemy_recipe":"e97b","accessory":"e97c","abyss_nexus":"e97d","abyss_gear":"e97e","abyss_enemy":"e97f","abyss_cresset":"e980","abyss_artifact":"e981"};

      var info = categoryMap[categoryId];
      if (!info) return '?';
      var iconName = info.category.icon;

      return code ? String.fromCharCode(parseInt(code, 16)) : '?';

    function createPinHtml(color, iconChar, isFound) {

      return '<div class="cdm-pin' + (isFound ? ' cdm-pin-found' : '') + '">' +

    // --- Simple markdown to safe HTML ---
    function renderMarkdown(text) {

      safe = safe.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
      safe = safe.replace(/\*(.+?)\*/g, '<i>$1</i>');

      // Bullet lists

        (isFound ? 'background:#27ae60;color:#fff;' : 'background:#444;color:#ccc;');
      btn.textContent = isFound ? '\u2713 Found' : 'Mark as Found';
      btn.addEventListener('click', function() {
        var nowFound = Progress.toggleFound(currentMapId, marker.id);
        updateMarkerAppearance(marker.id, nowFound);
        applyFilters();
        var lm = leafletMarkers[marker.id];
        if (lm) lm.setPopupContent(createPopupContent(marker));
        updateProgressDisplay();
      });
      container.appendChild(btn);

      return container;
    }

    function createCustomPopupContent(marker) {
      var container = document.createElement('div');

      var title = document.createElement('b');
      title.textContent = marker.title;
      container.appendChild(title);

      var catInfo = categoryMap[marker.categoryId];
      var catLabel = document.createElement('div');
      catLabel.style.cssText = 'font-size:11px;color:#aaa;margin:2px 0 4px;';
      catLabel.textContent = (catInfo ? catInfo.category.title : 'Custom') + ' (custom)';
      container.appendChild(catLabel);

      if (marker.note) {
        var note = document.createElement('div');
        note.style.cssText = 'font-size:12px;margin-bottom:6px;';
        note.textContent = marker.note;
        container.appendChild(note);
      }

      var btnRow = document.createElement('div');
      btnRow.style.cssText = 'display:flex;gap:6px;margin-top:6px;';

      var deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.style.cssText = 'flex:1;padding:6px;background:#e74c3c;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;';
      deleteBtn.addEventListener('click', function() {
        Progress.deleteCustomMarker(currentMapId, marker.id);
        var lm = leafletMarkers[marker.id];
        if (lm) { map.removeLayer(lm); delete leafletMarkers[marker.id]; }
      });

      btnRow.appendChild(deleteBtn);
      container.appendChild(btnRow);

      return container;
    }

    function updateMarkerAppearance(markerId, isFound) {
      var lm = leafletMarkers[markerId];
      if (!lm || !lm.setIcon) return;
      lm.setIcon(createPinIcon(lm._cdmCategoryId, isFound));
    }

    // --- Create pin divIcon ---
    function createPinIcon(categoryId, isFound) {
      var color = getMarkerColor(categoryId);
      var iconChar = getIconChar(categoryId);
      return L.divIcon({
        className: '',
        html: createPinHtml(color, iconChar, isFound),
        iconSize: [24, 32],
        iconAnchor: [12, 32],
        popupAnchor: [0, -32]
      });
    }

    // --- Place pre-populated markers (pin icons with deferred DOM creation) ---
    // Store marker data for deferred rendering
    var markerDataById = {};

    function placeMarkers() {
      currentMarkerData.markers.forEach(function(marker) {
        var latlng = L.latLng(marker.lat, marker.lng);
        var isFound = Progress.isFound(currentMapId, marker.id);
        var lm = L.marker(latlng, { icon: createPinIcon(marker.categoryId, isFound) });
        lm._cdmCategoryId = marker.categoryId;
        lm._cdmMarker = marker;
        lm.on('click', function() {
          lm.unbindPopup();
          lm.bindPopup(createPopupContent(marker), { maxWidth: 280 }).openPopup();
        });
        leafletMarkers[marker.id] = lm;
        markerDataById[marker.id] = marker;

        // Add to category layer group
        if (!categoryLayers[marker.categoryId]) {
          categoryLayers[marker.categoryId] = L.layerGroup();
        }
        categoryLayers[marker.categoryId].addLayer(lm);
      });

      // Add visible category layers to map
      Object.keys(categoryLayers).forEach(function(catId) {
        if (categoryVisibility[catId] !== false) {
          categoryLayers[catId].addTo(map);
        }
      });
    }
    placeMarkers();

    // Apply hide-found on startup
    if (hideFound) applyFilters();

    // --- Place custom markers ---
    function placeOneCustomMarker(marker) {
      var latlng = L.latLng(marker.lat || marker.y, marker.lng || marker.x);
      var lm = L.marker(latlng, { icon: createPinIcon(marker.categoryId, false), draggable: true }).addTo(map);
      lm._cdmCategoryId = marker.categoryId;
      leafletMarkers[marker.id] = lm;
      lm.on('click', function() {
        lm.unbindPopup();
        lm.bindPopup(createCustomPopupContent(marker), { maxWidth: 250 }).openPopup();
      });
      lm.on('dragend', function() {
        var pos = lm.getLatLng();
        Progress.updateCustomMarker(currentMapId, marker.id, { lat: pos.lat, lng: pos.lng });
      });
    }

    function placeCustomMarkers() {
      var customs = Progress.getCustomMarkers(currentMapId);
      customs.forEach(function(marker) { placeOneCustomMarker(marker); });
    }

    placeCustomMarkers();

    // --- Render Sidebar ---
    function renderSidebar() {
      var container = document.getElementById('sidebar-categories');
      container.innerHTML = '';

      currentMarkerData.groups.forEach(function(group) {
        var header = document.createElement('div');
        header.className = 'group-header';

        var arrow = document.createElement('span');
        arrow.className = 'group-arrow';
        arrow.textContent = '\u25BC';

        var colorDot = document.createElement('span');
        colorDot.style.cssText = 'width:10px;height:10px;border-radius:50%;background:' + group.color + ';flex-shrink:0;';

        var titleSpan = document.createElement('span');
        titleSpan.textContent = group.title;

        // Group-level toggle checkbox
        var groupCheckbox = document.createElement('input');
        groupCheckbox.type = 'checkbox';
        groupCheckbox.className = 'category-checkbox';
        var allVisible = group.categories.every(function(c) { return categoryVisibility[c.id] !== false; });
        var anyVisible = group.categories.some(function(c) { return categoryVisibility[c.id] !== false; });
        groupCheckbox.checked = allVisible;
        groupCheckbox.indeterminate = !allVisible && anyVisible;
        groupCheckbox.addEventListener('click', function(e) { e.stopPropagation(); });
        groupCheckbox.addEventListener('change', function() {
          var checked = groupCheckbox.checked;
          group.categories.forEach(function(c) { categoryVisibility[c.id] = checked; });
          saveVisibility();
          applyFilters();
          renderSidebar();
        });

        header.appendChild(groupCheckbox);
        header.appendChild(arrow);
        header.appendChild(colorDot);
        header.appendChild(titleSpan);
        container.appendChild(header);

        var catsDiv = document.createElement('div');
        catsDiv.className = 'group-categories';
        // Restore collapsed state
        var collapseKey = 'cdm-collapse';
        var collapsedGroups = {};
        try { var cg = localStorage.getItem(collapseKey); if (cg) collapsedGroups = JSON.parse(cg); } catch(e) {}
        if (collapsedGroups[group.id]) {
          catsDiv.classList.add('hidden');
          arrow.classList.add('collapsed');
        }

        group.categories.forEach(function(cat) {
          var row = document.createElement('div');
          row.className = 'category-row';

          var checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'category-checkbox';
          checkbox.checked = categoryVisibility[cat.id] !== false;
          checkbox.addEventListener('change', function() {
            categoryVisibility[cat.id] = checkbox.checked;
            saveVisibility();
            applyFilters();
            // Update group checkbox state
            var allOn = group.categories.every(function(c) { return categoryVisibility[c.id] !== false; });
            var anyOn = group.categories.some(function(c) { return categoryVisibility[c.id] !== false; });
            groupCheckbox.checked = allOn;
            groupCheckbox.indeterminate = !allOn && anyOn;
          });

          var iconSpan = document.createElement('span');
          iconSpan.className = 'category-icon';
          iconSpan.style.background = group.color;
          iconSpan.style.fontFamily = "'cdm-icons'";
          iconSpan.style.fontSize = '11px';
          var catCode = ICON_MAP[cat.icon];
          iconSpan.textContent = catCode ? String.fromCharCode(parseInt(catCode, 16)) : cat.title.charAt(0);

          var titleSpan = document.createElement('span');
          titleSpan.className = 'category-title';
          titleSpan.textContent = cat.title;

          var counts = Progress.getFoundCount(currentMapId, cat.id, currentMarkerData.markers);
          var countSpan = document.createElement('span');
          countSpan.className = 'category-count';
          countSpan.id = 'count-' + cat.id;
          countSpan.textContent = counts.found + '/' + counts.total;

          row.appendChild(checkbox);
          row.appendChild(iconSpan);
          row.appendChild(titleSpan);
          row.appendChild(countSpan);

          // Right-click category to "show only this"
          row.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            Object.keys(categoryVisibility).forEach(function(k) { categoryVisibility[k] = false; });
            categoryVisibility[cat.id] = true;
            saveVisibility();
            applyFilters();
            renderSidebar();
          });

          catsDiv.appendChild(row);
        });

        container.appendChild(catsDiv);

        header.addEventListener('click', function() {
          var isHidden = catsDiv.classList.toggle('hidden');
          arrow.classList.toggle('collapsed', isHidden);
          // Persist collapse state
          try {
            var cg = JSON.parse(localStorage.getItem(collapseKey) || '{}');
            if (isHidden) cg[group.id] = true; else delete cg[group.id];
            localStorage.setItem(collapseKey, JSON.stringify(cg));
          } catch(e) {}
        });
      });
    }

    // --- Hide found state ---
    var hideFound = false;
    try { hideFound = localStorage.getItem('cdm-hide-found') === 'true'; } catch(e) {}

    // --- Apply visibility filters ---
    function applyFilters() {
      // Toggle category layer groups
      Object.keys(categoryLayers).forEach(function(catId) {
        var visible = categoryVisibility[catId] !== false;
        if (visible && !map.hasLayer(categoryLayers[catId])) {
          categoryLayers[catId].addTo(map);
        } else if (!visible && map.hasLayer(categoryLayers[catId])) {
          map.removeLayer(categoryLayers[catId]);
        }
      });

      // Hide found markers if toggle is on
      if (hideFound) {
        currentMarkerData.markers.forEach(function(marker) {
          var lm = leafletMarkers[marker.id];
          if (!lm) return;
          if (Progress.isFound(currentMapId, marker.id)) {
            var el = lm.getElement && lm.getElement();
            if (el) el.style.display = 'none';
          }
        });
      }
    }

    // --- Update progress display ---
    function updateProgressDisplay() {
      var totals = Progress.getTotalCount(currentMapId, currentMarkerData.markers);
      var pct = totals.total > 0 ? Math.round((totals.found / totals.total) * 100) : 0;
      document.getElementById('progress-text').textContent = totals.found + '/' + totals.total + ' found (' + pct + '%)';
      document.getElementById('progress-bar').style.width = pct + '%';

      currentMarkerData.groups.forEach(function(group) {
        group.categories.forEach(function(cat) {
          var counts = Progress.getFoundCount(currentMapId, cat.id, currentMarkerData.markers);
          var el = document.getElementById('count-' + cat.id);
          if (el) el.textContent = counts.found + '/' + counts.total;
        });
      });
    }

    // --- Hide Found toggle ---
    var hideFoundCheckbox = document.getElementById('hide-found');
    hideFoundCheckbox.checked = hideFound;
    hideFoundCheckbox.addEventListener('change', function() {
      hideFound = hideFoundCheckbox.checked;
      try { localStorage.setItem('cdm-hide-found', hideFound); } catch(e) {}
      // Show all markers first, then re-filter
      currentMarkerData.markers.forEach(function(marker) {
        var lm = leafletMarkers[marker.id];
        if (!lm) return;
        var el = lm.getElement && lm.getElement();
        if (el) el.style.display = '';
      });
      applyFilters();
    });

    // --- Search with results list ---
    var searchResultsDiv = document.getElementById('search-results');
    var searchTimer = null;
    document.getElementById('search-input').addEventListener('input', function() {
      var q = this.value.trim().toLowerCase();

      if (searchTimer) clearTimeout(searchTimer);

      if (q.length < 2) {
        searchResultsDiv.style.display = 'none';
        searchResultsDiv.innerHTML = '';
        return;
      }

      // Debounce the results rendering
      searchTimer = setTimeout(function() {

      var matches = currentMarkerData.markers.filter(function(m) {
        return m.title.toLowerCase().indexOf(q) !== -1 ||
          (m.description && m.description.toLowerCase().indexOf(q) !== -1);
      }).slice(0, 50);

      searchResultsDiv.innerHTML = '';
      if (matches.length === 0) {
        searchResultsDiv.style.display = 'none';
        return;
      }

      searchResultsDiv.style.display = 'block';
      matches.forEach(function(marker) {
        var row = document.createElement('div');
        row.style.cssText = 'padding:5px 12px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;';
        row.addEventListener('mouseenter', function() { row.style.background = 'rgba(255,255,255,0.08)'; });
        row.addEventListener('mouseleave', function() { row.style.background = ''; });

        var dot = document.createElement('span');
        dot.style.cssText = 'width:8px;height:8px;border-radius:50%;flex-shrink:0;background:' + getMarkerColor(marker.categoryId) + ';';
        row.appendChild(dot);

        var catInfo = categoryMap[marker.categoryId];
        var label = document.createElement('span');
        label.style.cssText = 'flex:1;';
        label.textContent = marker.title;
        row.appendChild(label);

        var catSpan = document.createElement('span');
        catSpan.style.cssText = 'font-size:10px;color:#888;';
        catSpan.textContent = catInfo ? catInfo.category.title : '';
        row.appendChild(catSpan);

        var isFound = Progress.isFound(currentMapId, marker.id);
        if (isFound) {
          var check = document.createElement('span');
          check.style.cssText = 'color:#27ae60;font-size:10px;';
          check.textContent = '\u2713';
          row.appendChild(check);
        }

        row.addEventListener('click', function() {
          // Ensure category is visible
          if (categoryVisibility[marker.categoryId] === false) {
            categoryVisibility[marker.categoryId] = true;
            saveVisibility();
            applyFilters();
            renderSidebar();
          }
          var lm = leafletMarkers[marker.id];
          if (lm) {
            map.setView(L.latLng(marker.lat, marker.lng), 16);
            lm.unbindPopup();
            lm.bindPopup(createPopupContent(marker), { maxWidth: 280 }).openPopup();
          }
          // Close search results
          searchResultsDiv.style.display = 'none';
          searchResultsDiv.innerHTML = '';
        });

        searchResultsDiv.appendChild(row);
      });

      }, 150);
    });

    // --- Found opacity slider ---
    var opSlider = document.getElementById('found-opacity');
    var opVal = document.getElementById('found-opacity-val');
    opSlider.value = Math.round(foundOpacity * 100);
    opVal.textContent = opSlider.value + '%';
    opSlider.addEventListener('input', function() {
      foundOpacity = parseInt(opSlider.value) / 100;
      opVal.textContent = opSlider.value + '%';
      try { localStorage.setItem('cdm-found-opacity', foundOpacity); } catch(e) {}
      // Update found-opacity CSS for pin markers
      document.getElementById('found-opacity-style').textContent = '.cdm-pin-found { opacity:' + foundOpacity + '; }';
    });

    // --- Hide All / Show All ---
    document.getElementById('btn-hide-all').addEventListener('click', function() {
      Object.keys(categoryVisibility).forEach(function(k) { categoryVisibility[k] = false; });
      saveVisibility();
      applyFilters();
      renderSidebar();
    });

    document.getElementById('btn-show-all').addEventListener('click', function() {
      Object.keys(categoryVisibility).forEach(function(k) { categoryVisibility[k] = true; });
      saveVisibility();
      applyFilters();
      renderSidebar();
    });

    renderSidebar();
    updateProgressDisplay();

    // --- Map Selector ---
    var mapSelector = document.getElementById('map-selector');
    window.CDM_MAPS.forEach(function(m) {
      var opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.title;
      if (m.id === currentMapId) opt.selected = true;
      mapSelector.appendChild(opt);
    });

    mapSelector.addEventListener('change', function() {
      var newMapId = mapSelector.value;
      var newConfig = window.CDM_MAPS.find(function(m) { return m.id === newMapId; });
      if (!newConfig) return;

      if (!window.CDM_MARKERS[newMapId]) {
        var script = document.createElement('script');
        script.src = newConfig.markersFile;
        script.onload = function() { switchToMap(newMapId, newConfig); };
        script.onerror = function() { console.warn('Failed to load markers for', newMapId); };
        document.head.appendChild(script);
      } else {
        switchToMap(newMapId, newConfig);
      }
    });

    function switchToMap(newMapId, newConfig) {
      currentMapId = newMapId;
      currentMapConfig = newConfig;
      currentMarkerData = window.CDM_MARKERS[newMapId];

      categoryMap = {};
      categoryVisibility = { custom: true };
      currentMarkerData.groups.forEach(function(group) {
        group.categories.forEach(function(cat) {
          categoryMap[cat.id] = { category: cat, group: group };
          categoryVisibility[cat.id] = true;
        });
      });

      map.eachLayer(function(layer) { map.removeLayer(layer); });
      leafletMarkers = {};
      categoryLayers = {};

      L.tileLayer(newConfig.tilePattern, {
        minZoom: newConfig.minZoom || 8,
        maxZoom: newConfig.maxZoom || 19,
        noWrap: true
      }).addTo(map);
      map.setView(newConfig.center, newConfig.initialZoom || 11);

      markerDataById = {};
      currentMarkerData.markers.forEach(function(marker) {
        var latlng = L.latLng(marker.lat, marker.lng);
        var isFound = Progress.isFound(currentMapId, marker.id);
        var lm = L.marker(latlng, { icon: createPinIcon(marker.categoryId, isFound) });
        lm._cdmCategoryId = marker.categoryId;
        lm._cdmMarker = marker;
        lm.on('click', function() {
          lm.unbindPopup();
          lm.bindPopup(createPopupContent(marker), { maxWidth: 280 }).openPopup();
        });
        leafletMarkers[marker.id] = lm;
        markerDataById[marker.id] = marker;
        if (!categoryLayers[marker.categoryId]) categoryLayers[marker.categoryId] = L.layerGroup();
        categoryLayers[marker.categoryId].addLayer(lm);
      });

      Object.keys(categoryLayers).forEach(function(catId) {
        if (categoryVisibility[catId] !== false) categoryLayers[catId].addTo(map);
      });

      placeCustomMarkers();
      document.getElementById('search-input').value = '';
      renderSidebar();
      updateProgressDisplay();
    }

    // --- Tools menu toggle ---
    document.getElementById('btn-tools').addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('tools-menu').classList.toggle('visible');
    });
    document.addEventListener('click', function() {
      document.getElementById('tools-menu').classList.remove('visible');
    });

    // --- Export Progress ---
    document.getElementById('tool-export').addEventListener('click', function() {
      var data = Progress.getData();
      var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      var date = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = 'crimson-desert-progress-' + date + '.json';
      a.click();
      URL.revokeObjectURL(url);
      document.getElementById('tools-menu').classList.remove('visible');
    });

    // --- Import Progress ---
    document.getElementById('tool-import').addEventListener('click', function() {
      document.getElementById('import-file-input').click();
      document.getElementById('tools-menu').classList.remove('visible');
    });

    document.getElementById('import-file-input').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;

      var reader = new FileReader();
      reader.onload = function(evt) {
        try {
          var imported = JSON.parse(evt.target.result);
          if (typeof imported !== 'object' || imported === null) {
            alert('Invalid progress file format.');
            return;
          }

          var mode = prompt('How to import?\n\nType "merge" to keep existing + add new\nType "replace" to overwrite everything\nPress Cancel to abort');
          if (!mode) return;
          mode = mode.toLowerCase().trim();

          if (mode === 'merge') {
            var current = Progress.getData();
            Object.keys(imported).forEach(function(key) {
              if (key === 'schemaVersion') return;
              if (!current[key]) {
                current[key] = imported[key];
              } else {
                if (imported[key].found) {
                  imported[key].found.forEach(function(id) {
                    if (current[key].found.indexOf(id) === -1) {
                      current[key].found.push(id);
                    }
                  });
                }
                if (imported[key].notes) {
                  Object.keys(imported[key].notes).forEach(function(nk) {
                    current[key].notes[nk] = imported[key].notes[nk];
                  });
                }
                if (imported[key].customMarkers) {
                  var existingIds = {};
                  current[key].customMarkers.forEach(function(m) { existingIds[m.id] = true; });
                  imported[key].customMarkers.forEach(function(m) {
                    if (!existingIds[m.id]) {
                      current[key].customMarkers.push(m);
                    }
                  });
                }
              }
            });
            Progress.save();
          } else if (mode === 'replace') {
            Progress._data = imported;
            if (!Progress._data.schemaVersion) Progress._data.schemaVersion = 1;
            Progress.save();
          } else {
            alert('Unknown option. Import cancelled.');
            return;
          }

          switchToMap(currentMapId, currentMapConfig);
          alert('Progress imported successfully!');
        } catch (err) {
          alert('Failed to import: ' + err.message);
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    // --- Export Marker Data ---
    document.getElementById('tool-export-markers').addEventListener('click', function() {
      var data = currentMarkerData;
      var jsContent = 'window.CDM_MARKERS = window.CDM_MARKERS || {};\nwindow.CDM_MARKERS["' + currentMapId + '"] = ' + JSON.stringify(data, null, 2) + ';\n';
      var blob = new Blob([jsContent], { type: 'application/javascript' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = currentMapId + '.js';
      a.click();
      URL.revokeObjectURL(url);
      document.getElementById('tools-menu').classList.remove('visible');
    });

    // --- Import Save (future) ---
    document.getElementById('tool-import-save').addEventListener('click', function() {
      alert('Save file parsing is not yet available.\n\nWhen a parser is built, drop the parsed.json file here.');
      document.getElementById('tools-menu').classList.remove('visible');
    });

    // --- Reset Progress ---
    document.getElementById('tool-reset').addEventListener('click', function() {
      document.getElementById('tools-menu').classList.remove('visible');
      var choice = prompt('Reset progress?\n\nType "this" to reset current map only.\nType "all" to reset everything.\nPress Cancel to abort.');
      if (!choice) return;
      choice = choice.toLowerCase().trim();

      if (choice === 'this') {
        var data = Progress.getData();
        delete data[currentMapId];
        Progress.save();
        switchToMap(currentMapId, currentMapConfig);
        alert('Progress reset for ' + currentMapConfig.title);
      } else if (choice === 'all') {
        Progress._data = { schemaVersion: 1 };
        Progress.save();
        switchToMap(currentMapId, currentMapConfig);
        alert('All progress reset.');
      }
    });

    // --- Custom Marker Mode ---
    var isAddingMarker = false;

    document.getElementById('btn-add-marker').addEventListener('click', function() {
      isAddingMarker = true;
      document.getElementById('add-marker-banner').classList.add('visible');
      document.getElementById('map').style.cursor = 'crosshair';
    });

    document.getElementById('add-marker-banner').addEventListener('click', function() {
      isAddingMarker = false;
      document.getElementById('add-marker-banner').classList.remove('visible');
      document.getElementById('map').style.cursor = '';
    });

    map.on('contextmenu', function(e) {
      showAddMarkerPopup(e.latlng);
    });

    map.on('click', function(e) {
      if (!isAddingMarker) return;
      isAddingMarker = false;
      document.getElementById('add-marker-banner').classList.remove('visible');
      document.getElementById('map').style.cursor = '';
      showAddMarkerPopup(e.latlng);
    });

    function showAddMarkerPopup(latlng) {
      var container = document.createElement('div');
      container.style.cssText = 'min-width:200px;';

      var heading = document.createElement('b');
      heading.textContent = 'Add Custom Marker';
      container.appendChild(heading);
      container.appendChild(document.createElement('br'));

      var titleLabel = document.createElement('label');
      titleLabel.textContent = 'Title:';
      titleLabel.style.cssText = 'font-size:11px;color:#aaa;display:block;margin-top:6px;';
      container.appendChild(titleLabel);

      var titleInput = document.createElement('input');
      titleInput.type = 'text';
      titleInput.style.cssText = 'width:100%;padding:4px;background:#2a2a4a;color:#e0e0e0;border:1px solid #444;border-radius:3px;font-size:12px;';
      container.appendChild(titleInput);

      var catLabel = document.createElement('label');
      catLabel.textContent = 'Category:';
      catLabel.style.cssText = 'font-size:11px;color:#aaa;display:block;margin-top:6px;';
      container.appendChild(catLabel);

      var catSelect = document.createElement('select');
      catSelect.style.cssText = 'width:100%;padding:4px;background:#2a2a4a;color:#e0e0e0;border:1px solid #444;border-radius:3px;font-size:12px;';

      var customOpt = document.createElement('option');
      customOpt.value = 'custom';
      customOpt.textContent = 'Custom';
      catSelect.appendChild(customOpt);

      currentMarkerData.groups.forEach(function(group) {
        group.categories.forEach(function(cat) {
          var opt = document.createElement('option');
          opt.value = cat.id;
          opt.textContent = group.title + ' > ' + cat.title;
          catSelect.appendChild(opt);
        });
      });
      container.appendChild(catSelect);

      var noteLabel = document.createElement('label');
      noteLabel.textContent = 'Note:';
      noteLabel.style.cssText = 'font-size:11px;color:#aaa;display:block;margin-top:6px;';
      container.appendChild(noteLabel);

      var noteInput = document.createElement('textarea');
      noteInput.style.cssText = 'width:100%;height:40px;resize:vertical;font-size:12px;background:#2a2a4a;color:#e0e0e0;border:1px solid #444;border-radius:3px;padding:4px;';
      container.appendChild(noteInput);

      var btnRow = document.createElement('div');
      btnRow.style.cssText = 'display:flex;gap:6px;margin-top:8px;';

      var addBtn = document.createElement('button');
      addBtn.textContent = 'Add';
      addBtn.style.cssText = 'flex:1;padding:6px;background:#27ae60;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:bold;';

      var cancelBtn = document.createElement('button');
      cancelBtn.textContent = 'Cancel';
      cancelBtn.style.cssText = 'flex:1;padding:6px;background:#444;color:#ccc;border:none;border-radius:4px;cursor:pointer;';

      btnRow.appendChild(addBtn);
      btnRow.appendChild(cancelBtn);
      container.appendChild(btnRow);

      var popup = L.popup({ maxWidth: 250, closeOnClick: false })
        .setLatLng(latlng)
        .setContent(container)
        .openOn(map);

      cancelBtn.addEventListener('click', function() { map.closePopup(popup); });

      addBtn.addEventListener('click', function() {
        var title = titleInput.value.trim();
        if (!title) { titleInput.style.borderColor = '#e74c3c'; return; }

        var markerData = {
          categoryId: catSelect.value,
          title: title,
          lat: latlng.lat,
          lng: latlng.lng,
          note: noteInput.value.trim()
        };

        var saved = Progress.addCustomMarker(currentMapId, markerData);
        map.closePopup(popup);
        placeOneCustomMarker(saved);
        applyFilters();
      });
    }

    // --- Sidebar toggle for mobile ---
    document.getElementById('sidebar-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });

    map.on('click', function() {
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
      }
    });
  </script>
</body>
</html>
